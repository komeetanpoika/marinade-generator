  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a2535;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; flex: none; }
    header h1 span { color: #e8a020; }

    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex: 1; }

    input[type="search"] {
      padding: 7px 12px; border: none; border-radius: 6px;
      font-size: .9rem; min-width: 180px; background: #fff; color: #222;
    }
    select {
      padding: 7px 10px; border: none; border-radius: 6px;
      font-size: .9rem; background: #fff; color: #222; cursor: pointer;
    }

    .cat-tabs { display: flex; gap: 4px; }
    .cat-tab {
      padding: 6px 12px; border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 6px; font-size: .82rem; font-weight: 600;
      cursor: pointer; background: transparent; color: rgba(255,255,255,.7);
      transition: all .15s;
    }
    .cat-tab.active { background: #e8a020; border-color: #e8a020; color: #1a2535; }
    .cat-tab:hover:not(.active) { border-color: rgba(255,255,255,.6); color: #fff; }

    .brand-tabs { display: flex; gap: 4px; }
    .brand-tab {
      padding: 6px 12px; border: 1.5px solid rgba(255,255,255,.25);
      border-radius: 6px; font-size: .82rem; font-weight: 600;
      cursor: pointer; background: transparent; color: rgba(255,255,255,.7);
      transition: all .15s;
    }
    .brand-tab.active { background: #0d9488; border-color: #0d9488; color: #fff; }
    .brand-tab:hover:not(.active) { border-color: rgba(255,255,255,.6); color: #fff; }

    .btn {
      padding: 7px 14px; border: none; border-radius: 6px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #e8a020; color: #1a2535; }
    .btn-ghost  { background: rgba(255,255,255,.15); color: #fff; }
    .selected-count { font-size: .85rem; color: #aac; white-space: nowrap; }

    /* grid */
    main {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .card {
      background: #fff; border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,.1); display: flex;
      flex-direction: column; cursor: pointer;
      transition: box-shadow .15s, transform .15s; position: relative;
    }
    .card:hover { box-shadow: 0 6px 18px rgba(0,0,0,.16); transform: translateY(-2px); }
    .card.selected { outline: 3px solid #e8a020; }

    .card-check {
      position: absolute; top: 10px; right: 10px;
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.8);
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: background .15s;
    }
    .card.selected .card-check { background: #e8a020; border-color: #e8a020; color: #fff; }

    .card-header { padding: 14px 14px 10px; color: #fff; }
    .card-cat-badge {
      display: inline-block; font-size: .6rem; font-weight: 800;
      letter-spacing: .8px; text-transform: uppercase;
      background: rgba(255,255,255,.2); padding: 1px 6px;
      border-radius: 3px; margin-bottom: 5px;
    }
    .card-name { font-size: 1.05rem; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
    .card-tagline { font-size: .78rem; opacity: .88; font-style: italic; }

    .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-flavor { font-size: .82rem; color: #555; }
    .card-flavor strong { color: #222; }

    .card-ingredients {
      font-size: .75rem; color: #666; line-height: 1.45;
      border-top: 1px solid #f0f0f0; padding-top: 7px;
    }
    .card-ingredients strong { color: #444; display: block; margin-bottom: 2px; }

    .meat-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .meat-tag {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 12px;
      font-size: .72rem; font-weight: 600; color: #fff;
    }

    .card-footer {
      padding: 8px 14px 12px; display: flex;
      align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .badge {
      background: #eef6ee; color: #2a7a2a; border-radius: 4px;
      padding: 2px 7px; font-size: .68rem; font-weight: 600; letter-spacing: .3px;
    }
    .badge.lak { background: #e8f4fb; color: #1a6a9a; }
    .card-footer-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .card-size { font-size: .75rem; color: #999; font-weight: 600; }
    .brand-badge {
      font-size: .62rem; font-weight: 700; padding: 2px 6px;
      border-radius: 3px; color: #fff; letter-spacing: .3px;
    }
    .badge.suolaton { background: #f3f4f6; color: #6b7280; }

    .no-results { grid-column: 1/-1; text-align: center; color: #999; padding: 60px 0; font-size: 1.1rem; }

    /* print */
    #print-area { display: none; }

    @media print {
      header, main, .no-results { display: none !important; }
      #print-area { display: block !important; }
      @page { size: A4; margin: 10mm; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

      .print-page {
        display: grid;
        grid-template-rows: repeat(var(--card-count), 1fr);
        width: 190mm;
        height: 277mm;
        break-after: page;
      }
      .print-page:last-child { break-after: auto; }
    }

      overflow: hidden;
      border-top: 1px solid #e8e8e8;
      min-height: 0;
    }
    .icard:first-child { border-top: none; }

    .icard-header {
      padding: 4mm 8mm 3mm;
      color: #fff;
      flex-shrink: 0;
    }
    .icard-name {
      font-size: 16pt;
      font-weight: 800;
      font-variant: small-caps;
      letter-spacing: .04em;
      line-height: 1.2;
      font-family: 'Segoe UI', system-ui, sans-serif;

      display: flex;
      align-items: center;
    }
    .icard-ingredients {

    /* ── display cards ── */
    .scard {

      background: #262626;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.05);
      min-height: 0;

      flex-shrink: 0;

    .scard-body {
      padding: 4mm 10mm 2mm;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;

    .scard-name {

      font-weight: 800;

  const ing = ingredients.toLowerCase();
  return ALLERGENS.filter(a => a.keys.some(k => ing.includes(k))).map(a => a.name);
}

let selected = new Set();
let activeCat = '';
let activeBrand = '';

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  const idx = ['','marinadi','oljy','rub'].indexOf(cat);
  document.querySelectorAll('.cat-tab')[idx].classList.add('active');
  render();
}

function setBrand(brand) {
  activeBrand = brand;
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.remove('active'));
  const idx = ['','kk','mp'].indexOf(brand);
  document.querySelectorAll('.brand-tab')[idx].classList.add('active');
  render();
}

function getFiltered() {
  const q    = document.getElementById('search').value.toLowerCase();
  const meat = document.getElementById('meatFilter').value;
  return products.filter(p => {
    const matchBrand = !activeBrand || p.brand === activeBrand;
    const matchCat   = !activeCat   || p.category === activeCat;
    const matchQ     = !q || p.name.toLowerCase().includes(q) || p.flavor.toLowerCase().includes(q) || p.tagline.toLowerCase().includes(q) || p.ingredients.toLowerCase().includes(q);
    const matchMeat  = !meat || p.suitableFor.includes(meat);
    return matchBrand && matchCat && matchQ && matchMeat;
  });
}

function catLabel(cat) {
  if (cat === 'oljy') return 'Mausteöljy';
  if (cat === 'rub')  return 'Rub';
  return 'Marinadi';
}

function meatTagsHTML(list, cls = 'meat-tag') {
  return list.map(k => {
    const m = MEATS[k];
    return m ? `<span class="${cls}" style="background:${m.color}">${m.icon} ${m.label}</span>` : '';
  }).join('');
}

function render() {
  const items = getFiltered();
  const grid  = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<p class="no-results">Ei tuloksia – kokeile toista hakua.</p>';
    updateCount();
    return;
  }
  grid.innerHTML = items.map(p => {
    const sel = selected.has(p.id);
    return `
    <article class="card${sel ? ' selected' : ''}" onclick="toggleCard(${p.id})">
      <div class="card-check">${sel ? '✓' : ''}</div>
      <div class="card-header" style="background:${p.color}">
        <div class="card-cat-badge">${catLabel(p.category)}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-tagline">${p.tagline}</div>
      </div>
      <div class="card-body">
        <div class="card-flavor"><strong>Maku:</strong> ${p.flavor}</div>
        <div class="meat-tags">${meatTagsHTML(p.suitableFor)}</div>
        <div class="card-ingredients"><strong>Ainesosat:</strong> ${p.ingredients}</div>
      </div>
      <div class="card-footer">
        ${dietaryBadgesHTML(p.dietary)}
        <div class="card-footer-right">
          <span class="brand-badge" style="background:${BRAND_COLORS[p.brand]}">${BRAND_LABELS[p.brand]}</span>
          <span class="card-size">${p.size}</span>
        </div>
      </div>
    </article>`;
  }).join('');
  updateCount();
}

function toggleCard(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  render();
}

function selectAll()  { getFiltered().forEach(p => selected.add(p.id)); render(); }
function deselectAll() { selected.clear(); render(); }
function updateCount() { document.getElementById('selCount').textContent = `${selected.size} valittu`; }


function highlightAllergens(ingredients) {
  const allKeys = ALLERGENS.flatMap(a => a.keys);
  allKeys.sort((a, b) => b.length - a.length);
  const pattern = allKeys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
  return ingredients.replace(new RegExp(pattern, 'gi'), m => `<strong>${m}</strong>`);
}

function buildIngredientCards(items) {
  const pages = [];
  for (let i = 0; i < items.length; i += 6) {
    const chunk = items.slice(i, i + 6);
    const cards = chunk.map(p => `
      <div class="icard">
        <div class="icard-header" style="background:${p.color}">
          <div class="icard-name">${p.name}</div>
        </div>
        <div class="icard-body">
          <div class="icard-ingredients">${highlightAllergens(p.ingredients)}</div>
        </div>
      </div>`).join('');
    pages.push(`<div class="print-page" style="--card-count:${chunk.length}">${cards}</div>`);
  }
  return pages.join('');
}

function buildDisplayCards(items) {
  const pages = [];
  for (let i = 0; i < items.length; i += 6) {
    const chunk = items.slice(i, i + 6);
    const cards = chunk.map(p => {
      const allergens = detectAllergens(p.ingredients);
      const badges = [
        ...(!allergens.includes('Maito')    ? ['<span class="scard-badge">Laktoositon</span>'] : []),
        ...(!allergens.includes('Gluteeni') ? ['<span class="scard-badge">Gluteeniton</span>'] : []),
      ].join('');
      return `
      <div class="scard">
        <div class="scard-body">
          <div class="scard-name">${p.name}</div>
        </div>
        <div class="scard-stripe" style="background:${p.color}"></div>
        <div class="scard-tagline-section">
          <div class="scard-tagline">${p.tagline}</div>
        </div>
        <div class="scard-footer">
          <div class="scard-badges">${p.dietary.map(d => `<span class="scard-badge">${DIETARY_LABELS[d]}</span>`).join('')}</div>
        </div>
      </div>`;
    }).join('');
    pages.push(`<div class="print-page" style="--card-count:${chunk.length}">${cards}</div>`);
  }
  return pages.join('');
}

function generatePDF() {
  if (!selected.size) { alert('Valitse ensin vähintään yksi tuote.'); return; }

  const items = products.filter(p => selected.has(p.id));
  const printArea = document.getElementById('print-area');
  printArea.innerHTML = buildIngredientCards(items) + buildDisplayCards(items);

  window.onafterprint = () => { printArea.innerHTML = ''; };
  window.print();
}

render();
</script>
